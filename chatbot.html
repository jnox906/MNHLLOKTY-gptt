<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>MNHLLOKTY // AI_INTERFACE</title>
 <style>
 /* --- MONOLITHIC DESIGN SYSTEM --- */
 :root {
 --bg-color: #050505;
 --container-bg: #000000;
 --accent-color: #00ffcc; /* Neon Cyan */
 --text-main: #ffffff;
 --text-dim: #555555;
 --border-color: #222222;
 }

 * {
 margin: 0;
 padding: 0;
 box-sizing: border-box;
 font-family: 'Courier New', Courier, monospace;
 }

 body {
 background-color: var(--bg-color);
 color: var(--text-main);
 display: flex;
 justify-content: center;
 align-items: center;
 height: 100vh;
 padding: 20px;
 }

 .monolith-container {
 width: 100%;
 max-width: 700px;
 height: 80vh;
 background: var(--container-bg);
 border: 1px solid var(--border-color);
 display: flex;
 flex-direction: column;
 padding: 40px;
 box-shadow: 0 0 50px rgba(0,0,0,1);
 }

 header {
 border-bottom: 1px solid var(--border-color);
 padding-bottom: 20px;
 margin-bottom: 20px;
 }

 h1 {
 font-size: 12px;
 text-transform: uppercase;
 letter-spacing: 8px;
 color: var(--text-dim);
 }

 #chatBox {
 flex: 1;
 overflow-y: auto;
 margin-bottom: 30px;
 display: flex;
 flex-direction: column;
 gap: 20px;
 padding-right: 10px;
 }

 /* Custom Scrollbar */
 #chatBox::-webkit-scrollbar { width: 2px; }
 #chatBox::-webkit-scrollbar-thumb { background: var(--border-color); }

 .msg {
 font-size: 14px;
 line-height: 1.6;
 animation: fadeIn 0.3s ease;
 }

 @keyframes fadeIn {
 from { opacity: 0; transform: translateY(5px); }
 to { opacity: 1; transform: translateY(0); }
 }

 .user-msg {
 color: var(--text-main);
 border-left: 2px solid var(--text-main);
 padding-left: 15px;
 }

 .bot-msg {
 color: var(--accent-color);
 border-left: 2px solid var(--accent-color);
 padding-left: 15px;
 }

 .input-area {
 display: flex;
 flex-direction: column;
 gap: 15px;
 }

 input {
 background: transparent;
 border: none;
 border-bottom: 1px solid var(--border-color);
 color: var(--accent-color);
 padding: 10px 0;
 font-size: 16px;
 outline: none;
 transition: border-color 0.4s;
 }

 input:focus {
 border-bottom: 1px solid var(--accent-color);
 }

 button {
 align-self: flex-end;
 background: var(--text-main);
 color: #000;
 border: none;
 padding: 10px 30px;
 font-size: 11px;
 font-weight: bold;
 text-transform: uppercase;
 letter-spacing: 2px;
 cursor: pointer;
 transition: 0.3s;
 }

 button:hover {
 background: var(--accent-color);
 }

 .status-dot {
 height: 6px;
 width: 6px;
 background-color: var(--accent-color);
 border-radius: 50%;
 display: inline-block;
 margin-right: 10px;
 box-shadow: 0 0 8px var(--accent-color);
 }
 </style>
</head>
<body>

<div class="monolith-container">
 <header>
 <h1><span class="status-dot"></span>MNHLLOKTY // CORE_V2</h1>
 </header>

 <div id="chatBox">
 <div class="msg bot-msg">> TERMINAL READY. ENTER COMMAND.</div>
 </div>

 <div class="input-area">
 <input type="text" id="userInput" placeholder="TYPE_MESSAGE_HERE..." autocomplete="off">
 <button onclick="sendMessage()">Execute</button>
 </div>
</div>

<script>
 // --- CORE LOGIC ---
 const API_KEY = "AIzaSyDQXzHBKFaRYSAoIBcf6m0_N-s5K8t68So";
 const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;

 async function sendMessage() {
 const input = document.getElementById("userInput");
 const chatBox = document.getElementById("chatBox");
 const userText = input.value.trim();

 if (!userText) return;

 // Display User Message
 chatBox.innerHTML += `<div class="msg user-msg">> USER: ${userText}</div>`;
 input.value = "";
 chatBox.scrollTop = chatBox.scrollHeight;

 // Placeholder for AI
 const tempId = "id-" + Date.now();
 chatBox.innerHTML += `<div class="msg bot-msg" id="${tempId}">> SYSTEM: PROCESSING...</div>`;

 try {
 const response = await fetch(API_URL, {
 method: "POST",
 headers: { "Content-Type": "application/json" },
 body: JSON.stringify({
 contents: [{ parts: [{ text: userText }] }]
 })
 });

 const data = await response.json();

 if (data.error) {
 document.getElementById(tempId).innerText = `> ERROR: ${data.error.message}`;
 return;
 }

 const botReply = data.candidates[0].content.parts[0].text;
 document.getElementById(tempId).innerText = `> MNHLLOKTY: ${botReply}`;

 } catch (error) {
 document.getElementById(tempId).innerText = "> SYSTEM: DATA_LINK_FAILURE";
 console.error(error);
 }

 chatBox.scrollTop = chatBox.scrollHeight;
 }

 // Enter Key Binding
 document.getElementById("userInput").addEventListener("keypress", (e) => {
 if (e.key === "Enter") sendMessage();
 });
</script>

</body>
</html>
